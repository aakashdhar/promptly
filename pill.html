<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent !important;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      width: 520px;
      height: 90px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 8px;
    }

    .pill {
      display: flex; align-items: center;
      background: rgba(22,22,26,0.97);
      border-radius: 100px;
      border-top: 0.5px solid rgba(255,255,255,0.16);
      border-left: 0.5px solid rgba(255,255,255,0.1);
      border-right: 0.5px solid rgba(255,255,255,0.06);
      border-bottom: 0.5px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: 0 0 0 0.5px rgba(255,255,255,0.05) inset, 0 20px 48px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.5);
      padding: 8px 8px 8px 10px;
      position: relative;
      width: 480px;
      -webkit-app-region: drag;
    }
    .pill::before {
      content: ''; position: absolute;
      top: 0; left: 15%; right: 15%; height: 0.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      pointer-events: none;
    }

    .dismiss-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .wave-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 0 18px; height: 34px; min-width: 160px;
      -webkit-app-region: no-drag;
    }

    .pill-dur {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.06em;
      padding: 0 14px 0 0;
      font-variant-numeric: tabular-nums;
      -webkit-app-region: no-drag;
    }

    .stop-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: #FF3B30; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      animation: stop-glow 2s ease-in-out infinite;
      -webkit-app-region: no-drag;
    }
    @keyframes stop-glow {
      0%,100% { box-shadow: 0 0 18px rgba(255,59,48,0.55), 0 2px 8px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 30px rgba(255,59,48,0.9), 0 2px 8px rgba(0,0,0,0.4); }
    }
  </style>
</head>
<body>
  <div class="pill">
    <div class="dismiss-btn" id="dismiss-btn">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
        <path d="M1 1L11 11M11 1L1 11" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="wave-area">
      <canvas id="rec-canvas" width="160" height="34"></canvas>
    </div>
    <span class="pill-dur" id="pill-dur">0:00</span>
    <div class="stop-btn" id="stop-btn">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
        <rect x="2" y="2" width="8" height="8" rx="1.5" fill="white"/>
      </svg>
    </div>
  </div>

  <script>
    // Waveform animation
    let recAnimFrame = null;
    let recT = 0;

    function drawRecordingWave(canvas, t) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height, mid = H / 2;
      ctx.clearRect(0, 0, W, H);

      const grad = ctx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0, 'rgba(255,59,48,0)');
      grad.addColorStop(0.12, 'rgba(255,59,48,0.85)');
      grad.addColorStop(0.88, 'rgba(255,59,48,0.85)');
      grad.addColorStop(1, 'rgba(255,59,48,0)');

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,59,48,0.1)';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.moveTo(0, mid);
      for (let i = 0; i <= 80; i++) {
        const x = (i / 80) * W;
        const a = (Math.sin(i * 0.42 + t * 0.13) * 0.5 + 0.5) * 9 + (Math.sin(i * 0.85 + t * 0.08) * 0.4) * 3 + 1;
        ctx.lineTo(x, mid + (i % 2 === 0 ? a : -a));
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.moveTo(0, mid);
      for (let i = 0; i <= 80; i++) {
        const x = (i / 80) * W;
        const a = (Math.sin(i * 0.42 + t * 0.13) * 0.5 + 0.5) * 9 + (Math.sin(i * 0.85 + t * 0.08) * 0.4) * 3 + 1;
        ctx.lineTo(x, mid + (i % 2 === 0 ? a : -a));
      }
      ctx.stroke();
    }

    function startWave() {
      recT = 0;
      function loop() {
        recT++;
        drawRecordingWave(document.getElementById('rec-canvas'), recT);
        recAnimFrame = requestAnimationFrame(loop);
      }
      recAnimFrame = requestAnimationFrame(loop);
    }

    // Duration timer
    let recSecs = 0;
    let recTimer = null;

    function startTimer() {
      recSecs = 0;
      document.getElementById('pill-dur').textContent = '0:00';
      recTimer = setInterval(() => {
        recSecs++;
        const m = Math.floor(recSecs / 60);
        const s = recSecs % 60;
        document.getElementById('pill-dur').textContent = m + ':' + String(s).padStart(2, '0');
      }, 1000);
    }

    startWave();
    startTimer();

    document.getElementById('stop-btn').addEventListener('click', () => {
      window.electronAPI.pillStop();
    });

    document.getElementById('dismiss-btn').addEventListener('click', () => {
      window.electronAPI.pillDismiss();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.electronAPI.pillStop();
    });
  </script>
</body>
</html>
