<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-bar: rgba(255,255,255,0.04);
      --border-top: 0.5px solid rgba(255,255,255,0.18);
      --border-left: 0.5px solid rgba(255,255,255,0.1);
      --border-right: 0.5px solid rgba(255,255,255,0.06);
      --border-bottom: 0.5px solid rgba(255,255,255,0.04);
      --bar-radius: 18px;
      --bar-shadow: 0 0 0 0.5px rgba(255,255,255,0.06) inset, 0 32px 64px rgba(0,0,0,0.6), 0 8px 24px rgba(0,0,0,0.4);
      --bar-backdrop: blur(40px) saturate(180%);
      --highlight-top: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      --accent-bottom: linear-gradient(90deg, transparent, rgba(255,59,48,0.2), transparent);
      --divider: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      --blue: #0A84FF;
      --red: #FF3B30;
      --green: #30D158;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    body.light {
      --bg-bar: rgba(0,0,0,0.02);
      --border-top: 0.5px solid rgba(0,0,0,0.12);
      --border-left: 0.5px solid rgba(0,0,0,0.08);
      --border-right: 0.5px solid rgba(0,0,0,0.05);
      --border-bottom: 0.5px solid rgba(0,0,0,0.03);
      --bar-shadow: 0 0 0 0.5px rgba(0,0,0,0.06) inset, 0 16px 48px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
      --highlight-top: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent);
      --accent-bottom: linear-gradient(90deg, transparent, rgba(10,132,255,0.1), transparent);
      --divider: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent);
      --blue: #007AFF;
      --red: #FF3B30;
      --green: #34C759;
    }

    body.light .bar::before {
      background: rgba(255,255,255,0.7);
    }

    body.light .ready-title  { color: rgba(0,0,0,0.7); }
    body.light .ready-sub    { color: rgba(0,0,0,0.35); }
    body.light .think-title  { color: rgba(0,0,0,0.5); }
    body.light .mode-pill    {
      background: rgba(0,122,255,0.1);
      border-color: rgba(0,122,255,0.2);
      color: rgba(0,100,200,0.8);
    }
    body.light .pr-status    { color: rgba(0,0,0,0.45); }
    body.light .pr-btn       { color: rgba(0,0,0,0.3); }
    body.light .pr-btn:hover { color: #007AFF; }
    body.light .ys-label     { color: rgba(0,0,0,0.25); }
    body.light .ys-text      { color: rgba(0,0,0,0.6); }
    body.light .ys-label-s   { color: rgba(0,0,0,0.2); }
    body.light .ys-text-s    { color: rgba(0,0,0,0.55); }
    body.light .prompt-out   { color: rgba(0,0,0,0.8); }
    body.light .pt-sl        { color: rgba(0,100,200,0.5); }
    body.light .btn-edit     {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.03);
      color: rgba(0,0,0,0.5);
    }
    body.light .btn-edit:hover {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.15);
    }
    body.light .ready-title#error-message { color: rgba(0,0,0,0.7); }
    body.light .transcript-text { color: rgba(0,0,0,0.45); }
    body.light .rec-dur      { color: rgba(0,0,0,0.35); }
    body.light .dismiss-btn  {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.1);
    }
    body.light .dismiss-btn:hover { background: rgba(0,0,0,0.08); }

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden !important;
    }

    #app, #root, .app, .container, .wrapper {
      background: transparent !important;
    }

    body {
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .bar {
      width: 520px;
      min-height: 100vh;
      background: transparent;
      border-radius: var(--bar-radius);
      border-top: var(--border-top);
      border-left: var(--border-left);
      border-right: var(--border-right);
      border-bottom: var(--border-bottom);
      backdrop-filter: var(--bar-backdrop);
      -webkit-backdrop-filter: var(--bar-backdrop);
      box-shadow: var(--bar-shadow);
      position: relative;
      overflow: hidden;
    }
    .bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      border-radius: inherit;
      pointer-events: none;
      z-index: 0;
    }
    .bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%; height: 1px;
      background: var(--accent-bottom);
      pointer-events: none;
      z-index: 2;
    }

    #panel-idle, #panel-recording, #panel-thinking, #panel-ready, #panel-error {
      position: relative;
      z-index: 1;
    }

    /* Traffic light spacer — native macOS buttons render here via titleBarStyle: hiddenInset */
    .traf { height: 28px; -webkit-app-region: drag; }

    .div-line {
      height: 0.5px;
      background: var(--divider);
      margin: 0 18px;
    }

    .mode-pill {
      background: rgba(10,132,255,0.12);
      border: 0.5px solid rgba(10,132,255,0.25);
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(100,180,255,0.85);
      letter-spacing: 0.03em;
      flex-shrink: 0;
      -webkit-appearance: none;
      -webkit-app-region: no-drag;
    }

    /* === IDLE === */
    .cr-idle {
      height: 76px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      -webkit-app-region: drag;
      cursor: pointer;
    }

    .pulse-ring {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(10,132,255,0.15);
      border: 1px solid rgba(10,132,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      box-shadow: 0 0 12px rgba(10,132,255,0.3), 0 0 24px rgba(10,132,255,0.12);
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(10,132,255,0.35);
      animation: pulse-expand 1.8s ease-out infinite;
    }
    .pulse-ring::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(10,132,255,0.18);
      animation: pulse-expand 1.8s ease-out infinite 0.6s;
    }
    @keyframes pulse-expand {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .ready-text { flex: 1; margin-left: 14px; -webkit-app-region: no-drag; }
    .ready-title { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: 0.01em; margin-bottom: 3px; }
    .ready-sub { font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 0.01em; }

    /* === THINKING === */
    .cr-think {
      height: 80px; display: flex; align-items: center;
      padding: 0 22px; gap: 14px;
    }
    .status-badge {
      background: rgba(10,132,255,0.1);
      border: 0.5px solid rgba(10,132,255,0.2);
      border-radius: 20px; padding: 4px 12px;
      font-size: 10px; font-weight: 500;
      color: rgba(100,180,255,0.8); letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(10,132,255,0.9);
      box-shadow: 0 0 6px rgba(10,132,255,0.7);
      animation: status-pulse 1.5s ease-in-out infinite;
    }
    @keyframes status-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .think-title { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 500; letter-spacing: 0.01em; }
    .morph-wrap { padding: 10px 22px 24px; }
    .ys-label-s {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.14);
      margin-bottom: 12px; padding: 0 22px; display: block;
    }
    .ys-text-s { padding: 0 22px 28px; font-size: 13px; color: rgba(255,255,255,0.26); line-height: 1.75; letter-spacing: 0.01em; max-height: 120px; overflow-y: auto; scrollbar-width: thin; }
    .ys-text-s::-webkit-scrollbar { width: 3px; }
    .ys-text-s::-webkit-scrollbar-track { background: transparent; }
    .ys-text-s::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* === PROMPT READY === */
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 26px 22px 20px; }
    .pr-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.01em; }
    .pr-check { color: var(--green); font-size: 15px; text-shadow: 0 0 8px rgba(48,209,88,0.5); }
    .pr-actions { display: flex; gap: 18px; }
    .pr-btn {
      font-size: 11px; color: rgba(255,255,255,0.2); background: none; border: none;
      cursor: pointer; font-family: var(--font); padding: 0; letter-spacing: 0.01em;
      transition: color 150ms;
    }
    .pr-btn:hover { color: var(--blue); }

    .you-said-block { padding: 28px 22px 0; }
    .ys-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.16); margin-bottom: 12px; }
    .ys-text {
      font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.7; letter-spacing: 0.01em;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      margin-bottom: 4px;
    }

    .inner-div { height: 0.5px; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent); margin: 26px 22px; }

    .prompt-out {
      padding: 0 22px; padding-bottom: 4px;
      font-size: 13.5px; line-height: 1.9;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.01em;
      max-height: 200px; overflow-y: auto;
      white-space: pre-wrap;
    }
    .prompt-out::-webkit-scrollbar { width: 3px; }
    .prompt-out::-webkit-scrollbar-track { background: transparent; }
    .prompt-out::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .pt-sl {
      font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(100,170,255,0.42);
      display: block; margin-bottom: 8px; margin-top: 26px;
    }

    .btn-row { display: flex; gap: 10px; padding: 32px 22px 28px; }
    .btn-edit {
      height: 44px; padding: 0 24px;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      font-size: 13px; font-family: var(--font);
      color: rgba(255,255,255,0.4); cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 150ms, border-color 150ms;
    }
    .btn-edit:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }

    .btn-copy {
      flex: 1; height: 44px;
      background: linear-gradient(135deg, rgba(10,132,255,0.92), rgba(10,100,220,0.92));
      color: white; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: var(--font);
      cursor: pointer; letter-spacing: 0.02em;
      border-top: 0.5px solid rgba(255,255,255,0.18);
      box-shadow: 0 2px 20px rgba(10,132,255,0.4);
      transition: box-shadow 150ms, background 150ms;
    }
    .btn-copy:hover { box-shadow: 0 4px 28px rgba(10,132,255,0.65); }
    .btn-copy.copied { background: linear-gradient(135deg, rgba(48,209,88,0.9), rgba(36,160,68,0.9)); box-shadow: 0 2px 20px rgba(48,209,88,0.4); }

    /* === RECORDING === */
    .cr-rec {
      height: 68px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      -webkit-app-region: drag;
    }
    .dismiss-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: background 150ms;
    }
    .dismiss-btn:hover { background: rgba(255,255,255,0.12); }
    .wave-wrap { flex: 1; display: flex; align-items: center; height: 36px; -webkit-app-region: no-drag; }
    .rec-dur {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      min-width: 28px;
      text-align: right;
    }
    .stop-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--red); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-app-region: no-drag;
      animation: stop-glow 2s ease-in-out infinite;
    }
    @keyframes stop-glow {
      0%,100% { box-shadow: 0 0 14px rgba(255,59,48,0.5), 0 2px 8px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 28px rgba(255,59,48,0.9), 0 2px 8px rgba(0,0,0,0.4); }
    }
    .rec-div-line {
      height: 0.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      margin: 0 18px;
    }
    .transcript-wrap {
      padding: 12px 18px 14px;
      max-height: 100px;
      overflow-y: auto;
    }
    .transcript-wrap::-webkit-scrollbar { width: 3px; }
    .transcript-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .transcript-text {
      font-size: 12.5px;
      color: rgba(255,255,255,0.42);
      line-height: 1.6;
      letter-spacing: 0.01em;
    }
    .cursor-b {
      display: inline-block; width: 1.5px; height: 13px;
      background: rgba(255,255,255,0.6);
      margin-left: 1px; vertical-align: middle;
      animation: cb 1s step-end infinite;
    }
    @keyframes cb { 0%,100%{opacity:1} 50%{opacity:0} }

    /* === ERROR === */
    .cr-error {
      height: 76px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      cursor: pointer;
      -webkit-app-region: drag;
    }
    .error-badge {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,59,48,0.1);
      border: 0.5px solid rgba(255,59,48,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      -webkit-app-region: no-drag;
    }

  </style>
</head>
<body>

  <div class="bar" id="bar">

    <!-- IDLE -->
    <div id="panel-idle">
      <div class="traf"></div>
      <div class="cr-idle" id="idle-area">
        <div class="pulse-ring">
          <svg width="13" height="15" viewBox="0 0 12 16" fill="none">
            <rect x="3.5" y="0.5" width="5" height="9" rx="2.5" stroke="rgba(100,180,255,1)" stroke-width="1"/>
            <path d="M1 8.5C1 11.26 3.24 13.5 6 13.5C8.76 13.5 11 11.26 11 8.5" stroke="rgba(100,180,255,0.85)" stroke-width="1" stroke-linecap="round"/>
            <line x1="6" y1="13.5" x2="6" y2="15.5" stroke="rgba(100,180,255,0.85)" stroke-width="1" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="ready-text">
          <div class="ready-title">Promptly is ready</div>
          <div class="ready-sub">Press ⌥ Space or click to speak your prompt</div>
        </div>
        <span class="mode-pill" id="mode-pill">Balanced</span>
      </div>
    </div>

    <!-- RECORDING -->
    <div id="panel-recording" style="display:none">
      <div style="height:13px;-webkit-app-region:drag;"></div>
      <div class="cr-rec">
        <div class="dismiss-btn" id="dismissBtn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1L9 9M9 1L1 9" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="wave-wrap">
          <canvas id="recCanvas" width="340" height="36" style="width:100%;height:36px;display:block"></canvas>
        </div>
        <span class="rec-dur" id="recDur">0:00</span>
        <div class="stop-btn" id="stopBtn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <rect x="1.5" y="1.5" width="7" height="7" rx="1.5" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="rec-div-line"></div>
      <div class="transcript-wrap" id="transcriptWrap" style="display:none">
        <div class="transcript-text" id="transcriptText"></div>
      </div>
    </div>

    <!-- THINKING -->
    <div id="panel-thinking" style="display:none">
      <div class="traf"></div>
      <div class="cr-think">
        <div class="status-badge">
          <div class="status-dot"></div>
          Processing
        </div>
        <div class="think-title">Building your prompt</div>
      </div>
      <div class="morph-wrap">
        <canvas id="morph-canvas" width="476" height="32"></canvas>
      </div>
      <div class="div-line"></div>
      <span class="ys-label-s">You said</span>
      <div class="ys-text-s" id="think-transcript"></div>
    </div>

    <!-- PROMPT READY -->
    <div id="panel-ready" style="display:none">
      <div class="traf"></div>
      <div class="top-row">
        <div class="pr-status">
          <span class="pr-check">✓</span>
          <span>Prompt ready</span>
        </div>
        <div class="pr-actions">
          <button class="pr-btn" id="btn-regenerate">Regenerate</button>
          <button class="pr-btn" id="btn-reset">Reset</button>
        </div>
      </div>
      <div class="div-line"></div>
      <div class="you-said-block">
        <div class="ys-label">You said</div>
        <div class="ys-text" id="you-said-text"></div>
      </div>
      <div class="inner-div"></div>
      <div class="prompt-out" id="prompt-output"></div>
      <div class="btn-row">
        <button class="btn-edit" id="btn-edit">Edit</button>
        <button class="btn-copy" id="btn-copy">Copy prompt</button>
      </div>
    </div>

    <!-- ERROR -->
    <div id="panel-error" style="display:none">
      <div class="traf"></div>
      <div class="cr-error" id="error-area">
        <div class="error-badge" style="-webkit-app-region:no-drag">⚠</div>
        <div class="ready-text" style="margin-left:14px;-webkit-app-region:no-drag">
          <div class="ready-title" id="error-message">Something went wrong</div>
          <div class="ready-sub">Tap to retry</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const STATES = { IDLE:'IDLE', RECORDING:'RECORDING', THINKING:'THINKING', PROMPT_READY:'PROMPT_READY', ERROR:'ERROR' };
    const MODES = [
      { key: 'balanced', label: 'Balanced' },
      { key: 'detailed', label: 'Detailed' },
      { key: 'concise', label: 'Concise' },
      { key: 'chain', label: 'Chain' },
      { key: 'code', label: 'Code' },
      { key: 'design', label: 'Design' },
    ];

    const STATE_HEIGHTS = {
      IDLE: 101,
      RECORDING: 89,
      THINKING: 320,
      PROMPT_READY: 540,
      ERROR: 101,
    };

    let state = STATES.IDLE;
    let originalTranscript = '';
    let generatedPrompt = '';

    // Morph wave RAF handle — cancelled by stopMorphAnim() at every setState()
    let morphAnimFrame = null;

    function getMode() { return localStorage.getItem('mode') || 'balanced'; }
    function setMode(m) {
      localStorage.setItem('mode', m);
      if (state === STATES.IDLE) {
        document.getElementById('mode-pill').textContent = getModeLabel();
      }
    }
    function getModeLabel() {
      return { balanced:'Balanced', detailed:'Detailed', concise:'Concise', chain:'Chain', code:'Code', design:'Design' }[getMode()];
    }

    // --- Canvas: thinking morph wave (very slow, low-amplitude breathing) ---
    function drawMorphWave(canvas, t) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height, mid = H / 2;
      ctx.clearRect(0, 0, W, H);

      const grad = ctx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0, 'rgba(10,132,255,0)');
      grad.addColorStop(0.1, 'rgba(10,132,255,0.5)');
      grad.addColorStop(0.9, 'rgba(10,132,255,0.5)');
      grad.addColorStop(1, 'rgba(10,132,255,0)');

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(10,132,255,0.06)';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.moveTo(0, mid);
      for (let i = 0; i <= 100; i++) {
        const x = (i / 100) * W;
        const a = Math.sin(i * 0.18 + t * 0.04) * 3.5 + Math.sin(i * 0.42 + t * 0.025) * 1.5 + 0.5;
        ctx.lineTo(x, mid + a);
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.moveTo(0, mid);
      for (let i = 0; i <= 100; i++) {
        const x = (i / 100) * W;
        const a = Math.sin(i * 0.18 + t * 0.04) * 3.5 + Math.sin(i * 0.42 + t * 0.025) * 1.5 + 0.5;
        ctx.lineTo(x, mid + a);
      }
      ctx.stroke();
    }

    function stopMorphAnim() {
      if (morphAnimFrame) cancelAnimationFrame(morphAnimFrame);
      morphAnimFrame = null;
    }

    // --- Recording waveform + timer ---
    let recSecs = 0;
    let recTimer = null;
    let waveT = 0;
    let waveRAF = null;

    function drawRecordingWave(t) {
      const canvas = document.getElementById('recCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height, mid = H / 2;
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0, 'rgba(255,59,48,0)');
      grad.addColorStop(0.08, 'rgba(255,59,48,0.85)');
      grad.addColorStop(0.92, 'rgba(255,59,48,0.85)');
      grad.addColorStop(1, 'rgba(255,59,48,0)');
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,59,48,0.1)';
      ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.moveTo(0, mid);
      for (let i = 0; i <= 100; i++) {
        const x = (i / 100) * W;
        const a = (Math.sin(i * 0.42 + t * 0.13) * 0.5 + 0.5) * 10 + (Math.sin(i * 0.85 + t * 0.08) * 0.4) * 4 + 1;
        ctx.lineTo(x, mid + (i % 2 === 0 ? a : -a));
      }
      ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle = grad; ctx.lineWidth = 1.5; ctx.moveTo(0, mid);
      for (let i = 0; i <= 100; i++) {
        const x = (i / 100) * W;
        const a = (Math.sin(i * 0.42 + t * 0.13) * 0.5 + 0.5) * 10 + (Math.sin(i * 0.85 + t * 0.08) * 0.4) * 4 + 1;
        ctx.lineTo(x, mid + (i % 2 === 0 ? a : -a));
      }
      ctx.stroke();
    }

    function startRecTimer() {
      recSecs = 0;
      recTimer = setInterval(() => {
        recSecs++;
        const m = Math.floor(recSecs / 60);
        const s = recSecs % 60;
        const el = document.getElementById('recDur');
        if (el) el.textContent = m + ':' + String(s).padStart(2, '0');
      }, 1000);
      function animateWave() {
        drawRecordingWave(waveT++);
        waveRAF = requestAnimationFrame(animateWave);
      }
      animateWave();
    }

    function setRecordingTranscript(text) {
      const wrap = document.getElementById('transcriptWrap');
      const textEl = document.getElementById('transcriptText');
      if (!wrap || !textEl) return;
      textEl.textContent = text;
      if (!text) {
        wrap.style.display = 'none';
        window.electronAPI.resizeWindow(89);
      } else {
        wrap.style.display = 'block';
        const newH = 89 + Math.min(wrap.scrollHeight + 26, 120);
        window.electronAPI.resizeWindow(newH);
      }
    }

    function stopRecTimer() {
      clearInterval(recTimer);
      cancelAnimationFrame(waveRAF);
      recSecs = 0;
      waveT = 0;
    }

    // Parse **Header:** lines into pt-sl spans; rest is pre-wrapped text
    function renderPromptOutput(text) {
      const el = document.getElementById('prompt-output');
      el.textContent = '';
      const lines = text.split('\n');
      let buf = [];

      function flush() {
        const t = buf.join('\n').trim();
        if (t) {
          const s = document.createElement('span');
          s.textContent = t;
          el.appendChild(s);
        }
        buf = [];
      }

      for (const line of lines) {
        const m = line.trim().match(/^([A-Za-z][A-Za-z\s]*):\s*$/);
        if (m) {
          flush();
          const h = document.createElement('span');
          h.className = 'pt-sl';
          h.textContent = m[1].trim();
          el.appendChild(h);
        } else {
          buf.push(line);
        }
      }
      flush();
    }

    function setState(newState, payload = {}) {
      state = newState;

      stopMorphAnim();

      const bar = document.getElementById('bar');
      bar.style.display = 'none';
      ['panel-idle','panel-recording','panel-thinking','panel-ready','panel-error'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });

      if (newState === STATES.IDLE) {
        bar.style.display = '';
        document.getElementById('panel-idle').style.display = '';
        document.getElementById('mode-pill').textContent = getModeLabel();
        // BUG-003-C: resize after DOM paints
        requestAnimationFrame(() => window.electronAPI.resizeWindow(STATE_HEIGHTS.IDLE));
      }

      if (newState === STATES.RECORDING) {
        window.electronAPI.setWindowButtonsVisible(false);
        bar.style.display = '';
        document.getElementById('panel-recording').style.display = '';
        const durEl = document.getElementById('recDur');
        if (durEl) durEl.textContent = '0:00';
        const textEl = document.getElementById('transcriptText');
        if (textEl) textEl.textContent = '';
        const wrapEl = document.getElementById('transcriptWrap');
        if (wrapEl) wrapEl.style.display = 'none';
        stopRecTimer();
        startRecTimer();
        requestAnimationFrame(() => window.electronAPI.resizeWindow(89));
      }

      if (newState === STATES.THINKING) {
        window.electronAPI.setWindowButtonsVisible(true);
        bar.style.display = '';
        document.getElementById('panel-thinking').style.display = '';
        document.getElementById('think-transcript').textContent = '';
        let morphT = 0;
        const morphCanvas = document.getElementById('morph-canvas');
        if (morphCanvas) {
          const animMorph = () => { drawMorphWave(morphCanvas, morphT++); morphAnimFrame = requestAnimationFrame(animMorph); };
          morphAnimFrame = requestAnimationFrame(animMorph);
        }
        requestAnimationFrame(() => window.electronAPI.resizeWindow(STATE_HEIGHTS.THINKING));
      }

      if (newState === STATES.PROMPT_READY) {
        window.electronAPI.setWindowButtonsVisible(true);
        bar.style.display = '';
        document.getElementById('panel-ready').style.display = '';
        document.getElementById('you-said-text').textContent = originalTranscript;
        renderPromptOutput(generatedPrompt);
        requestAnimationFrame(() => window.electronAPI.resizeWindow(STATE_HEIGHTS.PROMPT_READY));
      }

      if (newState === STATES.ERROR) {
        bar.style.display = '';
        document.getElementById('panel-error').style.display = '';
        document.getElementById('error-message').textContent = payload.message || 'Something went wrong';
        requestAnimationFrame(() => window.electronAPI.resizeWindow(STATE_HEIGHTS.ERROR));
      }
    }

    // Idle area click → start recording
    document.getElementById('idle-area').addEventListener('click', () => {
      if (state === STATES.IDLE) startRecording();
    });

    // Mode pill click → open native mode menu
    document.getElementById('mode-pill').addEventListener('click', (e) => {
      e.stopPropagation();
      window.electronAPI.showModeMenu(getMode());
    });

    // Error area click → retry
    document.getElementById('error-area').addEventListener('click', () => {
      if (state === STATES.ERROR) setState(STATES.IDLE);
    });

    // Dismiss button — cancel recording
    document.getElementById('dismissBtn').addEventListener('click', () => {
      if (mediaRecorder) {
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        mediaRecorder = null;
      }
      audioChunks = [];
      isProcessing = false;
      stopRecTimer();
      setState(STATES.IDLE);
    });

    // Stop button — end recording and process
    document.getElementById('stopBtn').addEventListener('click', () => {
      stopRecording();
    });

    // Global shortcut from main process
    window.electronAPI.onShortcutTriggered(() => {
      if (state === STATES.IDLE) startRecording();
      else if (state === STATES.RECORDING) stopRecording();
    });

    // --- Recording ---
    let mediaRecorder = null;
    let audioChunks = [];

    let isProcessing = false;

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        setState(STATES.RECORDING);
      } catch(e) {
        setState(STATES.ERROR, { message: 'Microphone access denied' });
      }
    }

    async function stopRecording() {
      if (!mediaRecorder || isProcessing) return;
      isProcessing = true;
      stopRecTimer();
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const arrayBuffer = await blob.arrayBuffer();
        setState(STATES.THINKING);
        isProcessing = false;
        const transcribeResult = await window.electronAPI.transcribeAudio(arrayBuffer);
        if (!transcribeResult.success) {
          setState(STATES.ERROR, { message: transcribeResult.error });
          return;
        }
        originalTranscript = transcribeResult.transcript.trim();
        if (!originalTranscript) {
          setState(STATES.IDLE);
          return;
        }
        document.getElementById('think-transcript').textContent = originalTranscript;
        const thinkingPanel = document.getElementById('panel-thinking');
        window.electronAPI.resizeWindow(320);
        const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
        if (!genResult.success) {
          setState(STATES.ERROR, { message: genResult.error || 'Claude error' });
          return;
        }
        generatedPrompt = genResult.prompt;
        setState(STATES.PROMPT_READY);
      };
    }

    // Copy
    document.getElementById('btn-copy').addEventListener('click', () => {
      window.electronAPI.copyToClipboard(generatedPrompt);
      const btn = document.getElementById('btn-copy');
      btn.classList.add('copied');
      btn.textContent = 'Copied ✓';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = 'Copy prompt';
      }, 1800);
    });

    // Edit / Done
    document.getElementById('btn-edit').addEventListener('click', () => {
      const out = document.getElementById('prompt-output');
      const btn = document.getElementById('btn-edit');
      if (btn.textContent === 'Edit') {
        out.contentEditable = 'true';
        out.style.outline = '1.5px solid rgba(10,132,255,0.6)';
        out.style.outlineOffset = '4px';
        out.style.borderRadius = '6px';
        out.focus();
        btn.textContent = 'Done';
      } else {
        generatedPrompt = out.textContent;
        out.contentEditable = 'false';
        out.style.outline = 'none';
        btn.textContent = 'Edit';
      }
    });

    // Escape: cancel edit or stop recording
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const out = document.getElementById('prompt-output');
        if (out.contentEditable === 'true') {
          out.contentEditable = 'false';
          out.style.outline = 'none';
          renderPromptOutput(generatedPrompt);
          document.getElementById('btn-edit').textContent = 'Edit';
        } else if (state === STATES.RECORDING) {
          stopRecording();
        }
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'c' && state === STATES.PROMPT_READY) {
        const out = document.getElementById('prompt-output');
        if (out.contentEditable !== 'true') {
          window.electronAPI.copyToClipboard(generatedPrompt);
        }
      }
    });

    // Regenerate
    document.getElementById('btn-regenerate').addEventListener('click', async () => {
      setState(STATES.THINKING);
      document.getElementById('think-transcript').textContent = originalTranscript;
      const regenPanel = document.getElementById('panel-thinking');
      window.electronAPI.resizeWindow(320);
      const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
      if (!genResult.success) {
        setState(STATES.ERROR, { message: genResult.error || 'Claude error' });
        return;
      }
      generatedPrompt = genResult.prompt;
      setState(STATES.PROMPT_READY);
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => setState(STATES.IDLE));

    // Mode menu — native Electron menu (avoids HTML overflow clipping)
    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (state !== STATES.IDLE) return;
      window.electronAPI.showModeMenu(getMode());
    });

    window.electronAPI.onModeSelected((key) => {
      setMode(key);
    });

    // Init
    setState(STATES.IDLE);
  </script>
</body>
</html>
