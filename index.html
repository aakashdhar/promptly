<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promptly</title>
    <style>
      :root {
        --color-action: #007AFF;
        --color-recording: #FF3B30;
        --color-success: #34C759;
        --bg-window: rgba(255, 255, 255, 0.85);
        --radius-window: 14px;
        --radius-inner: 8px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        background: var(--bg-window);
        border-radius: var(--radius-window);
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
      }

      #app {
        width: 480px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .state-panel {
        width: 100%;
        padding: 0 16px;
        display: flex;
        align-items: center;
      }

      /* IDLE */
      #state-idle {
        height: 44px;
        padding: 0 16px 0 72px;
        gap: 8px;
        position: relative;
      }
      .mode-pill {
        font-size: 11px;
        font-weight: 600;
        color: var(--color-action);
        background: rgba(0, 122, 255, 0.08);
        padding: 2px 8px;
        border-radius: var(--radius-inner);
      }
      .shortcut-hint {
        font-size: 13px;
        color: rgba(0,0,0,0.4);
      }
      .conflict-notice {
        font-size: 11px;
        color: rgba(0,0,0,0.5);
        position: absolute;
        bottom: 4px;
        left: 0; right: 0;
        text-align: center;
      }

      /* RECORDING */
      #state-recording {
        height: 80px;
        padding: 0 16px 0 72px;
        gap: 10px;
      }
      .recording-row {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .recording-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-recording);
        flex-shrink: 0;
        animation: blink 1s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      .recording-transcript {
        flex: 1;
        font-size: 13px;
        color: rgba(0,0,0,0.75);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .stop-hint {
        font-size: 11px;
        color: rgba(0,0,0,0.35);
        flex-shrink: 0;
      }

      /* THINKING */
      #state-thinking {
        height: 44px;
        gap: 8px;
        justify-content: center;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(0,0,0,0.15);
        border-top-color: var(--color-action);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .thinking-text {
        font-size: 13px;
        color: rgba(0,0,0,0.5);
      }

      /* PROMPT_READY */
      #state-prompt-ready {
        height: 200px;
        flex-direction: column;
        padding: 12px 16px;
        gap: 10px;
        align-items: stretch;
        justify-content: flex-start;
      }
      .prompt-output {
        flex: 1;
        font-size: 13px;
        line-height: 1.5;
        color: rgba(0,0,0,0.85);
        overflow-y: auto;
        border-radius: var(--radius-inner);
        background: rgba(0,0,0,0.03);
        padding: 8px 10px;
        -webkit-user-select: text;
        user-select: text;
      }
      .prompt-output:focus {
        outline: 2px solid var(--color-action);
        outline-offset: -1px;
      }
      .action-row {
        display: flex;
        gap: 6px;
        justify-content: flex-start;
      }
      .btn-action {
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: var(--radius-inner);
        border: none;
        cursor: pointer;
        background: var(--color-action);
        color: #fff;
        transition: opacity 150ms ease;
      }
      .btn-action:hover { opacity: 0.85; }
      .btn-action.btn-success {
        background: var(--color-success);
      }
      .btn-secondary {
        font-family: inherit;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: var(--radius-inner);
        border: none;
        cursor: pointer;
        background: rgba(0,0,0,0.06);
        color: rgba(0,0,0,0.6);
        transition: opacity 150ms ease;
        margin-left: auto;
      }
      .btn-secondary:hover { opacity: 0.75; }

      /* ERROR */
      #state-error {
        height: 44px;
        gap: 8px;
        cursor: pointer;
      }
      .error-icon {
        font-size: 14px;
        flex-shrink: 0;
      }
      .error-message {
        flex: 1;
        font-size: 12px;
        color: rgba(0,0,0,0.75);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .error-dismiss {
        font-size: 11px;
        color: rgba(0,0,0,0.35);
        flex-shrink: 0;
      }

      /* FIRST_RUN */
      #state-first-run {
        height: 120px;
        flex-direction: column;
        padding: 12px 16px;
        gap: 10px;
        align-items: stretch;
        justify-content: center;
      }
      .firstrun-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .firstrun-status {
        font-size: 14px;
        flex-shrink: 0;
      }
      .firstrun-label {
        flex: 1;
        font-size: 13px;
        color: rgba(0,0,0,0.75);
      }
      .status-ok    { color: var(--color-success); }
      .status-error { color: var(--color-recording); }

      /* Waveform */
      .waveform {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 1;
        justify-content: center;
      }
      .waveform-bar {
        width: 3px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .waveform-idle .waveform-bar {
        background: rgba(0, 0, 0, 0.18);
      }
      .waveform-recording .waveform-bar {
        background: var(--color-recording);
      }
      #mode-menu {
        position: fixed;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: var(--radius-inner);
        padding: 4px 0;
        min-width: 140px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        z-index: 1000;
      }
      .mode-menu-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        font-size: 13px;
        color: #1a1a1a;
        cursor: pointer;
        user-select: none;
      }
      .mode-menu-item:hover {
        background: rgba(0, 122, 255, 0.08);
      }
      .mode-check {
        width: 12px;
        color: var(--color-action);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- FIRST_RUN -->
      <div id="state-first-run" class="state-panel" hidden>
        <div class="firstrun-row" id="firstrun-cli-row">
          <span id="firstrun-cli-status" class="firstrun-status">○</span>
          <span id="firstrun-cli-label" class="firstrun-label">Claude CLI installed</span>
        </div>
        <div class="firstrun-row" id="firstrun-mic-row">
          <span id="firstrun-mic-status" class="firstrun-status">○</span>
          <span id="firstrun-mic-label" class="firstrun-label">Microphone access granted</span>
          <button id="firstrun-mic-btn" class="btn-action">Grant Access</button>
        </div>
      </div>

      <!-- IDLE -->
      <div id="state-idle" class="state-panel" hidden>
        <span id="idle-mode-label" class="mode-pill">Balanced</span>
        <div id="idle-waveform" class="waveform waveform-idle"></div>
        <span id="idle-shortcut-hint" class="shortcut-hint">⌥Space</span>
        <span id="idle-conflict-notice" class="conflict-notice" hidden>Shortcut ⌥Space taken — using ⌃`</span>
      </div>

      <!-- RECORDING -->
      <div id="state-recording" class="state-panel" hidden>
        <span id="recording-dot" class="recording-dot"></span>
        <div id="recording-waveform" class="waveform waveform-recording"></div>
        <span id="recording-stop-hint" class="stop-hint">⌥Space to stop</span>
        <span id="recording-transcript" hidden></span>
      </div>

      <!-- THINKING -->
      <div id="state-thinking" class="state-panel" hidden>
        <div id="thinking-spinner" class="spinner"></div>
        <span id="thinking-text" class="thinking-text">Generating prompt…</span>
      </div>

      <!-- PROMPT_READY -->
      <div id="state-prompt-ready" class="state-panel" hidden>
        <div id="prompt-output" class="prompt-output"></div>
        <div class="action-row">
          <button id="action-copy" class="btn-action">Copy</button>
          <button id="action-edit" class="btn-action">Edit</button>
          <button id="action-done" class="btn-action btn-done" hidden>Done</button>
          <button id="action-regenerate" class="btn-secondary">Regenerate</button>
        </div>
      </div>

      <!-- ERROR -->
      <div id="state-error" class="state-panel" hidden>
        <span class="error-icon">⚠</span>
        <span id="error-message" class="error-message">An error occurred.</span>
        <span class="error-dismiss">Tap to dismiss</span>
      </div>
    </div>
    <div id="mode-menu" hidden></div>
    <script>
      let currentState = null;
      let transcript = '';
      let originalTranscript = '';
      let generatedPrompt = '';
      let cliOk = false;
      let micOk = false;
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;
      let waveformInterval = null;

      const STATE_HEIGHTS = {
        FIRST_RUN: 120,
        IDLE: 44,
        RECORDING: 80,
        THINKING: 44,
        PROMPT_READY: 200,
        ERROR: 44,
      };

      const MODES = [
        { key: 'balanced', label: 'Balanced' },
        { key: 'detailed', label: 'Detailed' },
        { key: 'concise', label: 'Concise' },
        { key: 'chain', label: 'Chain' },
        { key: 'code', label: 'Code' },
      ];

      function getMode() {
        try { return localStorage.getItem('mode') || 'balanced'; } catch { return 'balanced'; }
      }
      function setMode(value) {
        try { localStorage.setItem('mode', value); } catch { /* silent */ }
      }
      function getFirstRunComplete() {
        try { return localStorage.getItem('firstRunComplete') === 'true'; } catch { return false; }
      }
      function setFirstRunComplete(value) {
        try { localStorage.setItem('firstRunComplete', String(value)); } catch { /* silent */ }
      }

      function setState(newState, payload = {}) {
        if (STATE_HEIGHTS[newState] === undefined) {
          console.error('setState: unknown state', newState);
          return;
        }
        const prevState = currentState;
        currentState = newState;
        if (newState === 'RECORDING') startWaveform();
        else if (prevState === 'RECORDING') stopWaveform();

        // Hide all panels; show active
        const panels = ['FIRST_RUN', 'IDLE', 'RECORDING', 'THINKING', 'PROMPT_READY', 'ERROR'];
        panels.forEach(s => {
          const id = 'state-' + s.toLowerCase().replace('_', '-');
          document.getElementById(id).hidden = (s !== newState);
        });

        // Payload handling
        if (newState === 'ERROR' && payload.message) {
          document.getElementById('error-message').textContent = payload.message;
        }
        if (newState === 'PROMPT_READY' && payload.prompt) {
          document.getElementById('prompt-output').textContent = payload.prompt;
        }
        if (newState === 'IDLE') {
          document.getElementById('idle-conflict-notice').hidden = !payload.conflictNotice;
        }

        console.log('setState →', newState, payload);
        if (window.electronAPI && window.electronAPI.resizeWindow) {
          window.electronAPI.resizeWindow(STATE_HEIGHTS[newState]);
        }
      }

      async function initFirstRun() {
        setState('FIRST_RUN');

        // CLI check
        const cliStatus = document.getElementById('firstrun-cli-status');
        const cliLabel = document.getElementById('firstrun-cli-label');
        let cliResult;
        try {
          cliResult = await window.electronAPI.checkClaudePath();
        } catch {
          cliResult = { found: false, error: 'IPC unavailable' };
        }
        if (cliResult.found) {
          cliOk = true;
          cliStatus.textContent = '✓';
          cliStatus.className = 'firstrun-status status-ok';
        } else {
          cliStatus.textContent = '✗';
          cliStatus.className = 'firstrun-status status-error';
          cliLabel.textContent = 'Install: npm i -g @anthropic-ai/claude-code';
        }

        // Mic pre-check
        const micStatus = document.getElementById('firstrun-mic-status');
        const micLabel = document.getElementById('firstrun-mic-label');
        const micBtn = document.getElementById('firstrun-mic-btn');
        try {
          const permResult = await navigator.permissions.query({ name: 'microphone' });
          if (permResult.state === 'granted') {
            micOk = true;
            micStatus.textContent = '✓';
            micStatus.className = 'firstrun-status status-ok';
            micBtn.hidden = true;
          } else if (permResult.state === 'denied') {
            micStatus.textContent = '✗';
            micStatus.className = 'firstrun-status status-error';
            micLabel.textContent = 'Enable in System Settings → Privacy';
            micBtn.hidden = true;
          }
          // 'prompt' state: leave button visible, ○ stays
        } catch {
          // permissions API unsupported — leave button visible
        }

        checkFirstRunCompletion();
      }

      function checkFirstRunCompletion() {
        if (cliOk && micOk) {
          setFirstRunComplete(true);
          setTimeout(() => setState('IDLE'), 600);
        }
      }

      async function startRecording() {
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch {
          setState('ERROR', { message: 'Microphone access denied' });
          return;
        }
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const arrayBuffer = await blob.arrayBuffer();
          setState('THINKING');
          const result = await window.electronAPI.transcribeAudio(arrayBuffer);
          if (!result.success) {
            setState('ERROR', { message: result.error });
            return;
          }
          originalTranscript = result.transcript.trim();
          if (!originalTranscript) {
            setState('ERROR', { message: 'No speech detected — try again' });
            return;
          }
          const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
          if (!genResult.success) {
            setState('ERROR', { message: genResult.error });
            return;
          }
          generatedPrompt = genResult.prompt;
          setState('PROMPT_READY', { prompt: generatedPrompt });
        };
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('recording-transcript').textContent = 'Recording…';
        setState('RECORDING');
      }

      function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
      }

      function buildWaveforms() {
        const idleContainer = document.getElementById('idle-waveform');
        for (let i = 0; i < 30; i++) {
          const bar = document.createElement('div');
          bar.className = 'waveform-bar';
          bar.style.height = Math.round(3 + (Math.sin(i * 0.5) + 1) * 3) + 'px';
          idleContainer.appendChild(bar);
        }
        const recContainer = document.getElementById('recording-waveform');
        for (let i = 0; i < 30; i++) {
          const bar = document.createElement('div');
          bar.className = 'waveform-bar';
          bar.style.height = '4px';
          recContainer.appendChild(bar);
        }
      }

      function startWaveform() {
        const bars = document.querySelectorAll('#recording-waveform .waveform-bar');
        let t = 0;
        waveformInterval = setInterval(() => {
          t += 0.12;
          bars.forEach((bar, i) => {
            const sine = (Math.sin(t + i * 0.35) + 1) / 2;
            const noise = Math.random() * 0.25;
            bar.style.height = Math.max(4, Math.round((sine * 0.75 + noise) * 32)) + 'px';
          });
        }, 50);
      }

      function stopWaveform() {
        clearInterval(waveformInterval);
        waveformInterval = null;
        document.querySelectorAll('#recording-waveform .waveform-bar').forEach(bar => {
          bar.style.height = '4px';
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        buildWaveforms();

        // Shortcut listener — start/stop real speech recording
        window.electronAPI.onShortcutTriggered(() => {
          if (currentState === 'IDLE') {
            startRecording();
          } else if (currentState === 'RECORDING') {
            stopRecording();
          }
        });

        // Conflict notice — route through setState so re-entering IDLE resets visibility correctly
        window.electronAPI.onShortcutConflict(() => {
          setState('IDLE', { conflictNotice: true });
        });

        // Mic grant button handler
        document.getElementById('firstrun-mic-btn').addEventListener('click', async () => {
          const micStatus = document.getElementById('firstrun-mic-status');
          const micLabel = document.getElementById('firstrun-mic-label');
          const micBtn = document.getElementById('firstrun-mic-btn');
          try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            micOk = true;
            micStatus.textContent = '✓';
            micStatus.className = 'firstrun-status status-ok';
            micBtn.hidden = true;
            checkFirstRunCompletion();
          } catch {
            micStatus.textContent = '✗';
            micStatus.className = 'firstrun-status status-error';
            micLabel.textContent = 'Enable in System Settings → Privacy';
            micBtn.hidden = true;
          }
        });

        // Error dismiss on click
        document.getElementById('state-error').addEventListener('click', () => {
          setState('IDLE');
        });

        // Set mode label from localStorage
        const initialMode = getMode();
        document.getElementById('idle-mode-label').textContent =
          initialMode.charAt(0).toUpperCase() + initialMode.slice(1);

        // Build mode menu items
        const modeMenu = document.getElementById('mode-menu');
        MODES.forEach(({ key, label }) => {
          const item = document.createElement('div');
          item.className = 'mode-menu-item';
          item.dataset.mode = key;
          const check = document.createElement('span');
          check.className = 'mode-check';
          check.textContent = getMode() === key ? '✓' : '';
          const txt = document.createElement('span');
          txt.textContent = label;
          item.appendChild(check);
          item.appendChild(txt);
          item.addEventListener('click', (e) => {
            e.stopPropagation();
            setMode(key);
            document.getElementById('idle-mode-label').textContent = label;
            document.querySelectorAll('.mode-check').forEach((el) => {
              el.textContent = el.closest('.mode-menu-item').dataset.mode === key ? '✓' : '';
            });
            modeMenu.hidden = true;
          });
          modeMenu.appendChild(item);
        });

        // Show on right-click in IDLE only
        window.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          if (currentState !== 'IDLE') return;
          modeMenu.hidden = false;
          const x = Math.min(e.clientX, window.innerWidth - 160);
          const y = Math.max(0, e.clientY - modeMenu.offsetHeight - 4);
          modeMenu.style.left = x + 'px';
          modeMenu.style.top = y + 'px';
        });

        // Hide on any click outside menu
        window.addEventListener('click', () => {
          modeMenu.hidden = true;
        });

        // Copy
        document.getElementById('action-copy').addEventListener('click', async () => {
          await window.electronAPI.copyToClipboard(generatedPrompt);
          const btn = document.getElementById('action-copy');
          btn.textContent = 'Copied!';
          btn.classList.add('btn-success');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('btn-success');
          }, 1800);
        });

        // Edit
        document.getElementById('action-edit').addEventListener('click', () => {
          const output = document.getElementById('prompt-output');
          output.contentEditable = 'true';
          output.focus();
          document.getElementById('action-edit').hidden = true;
          document.getElementById('action-done').hidden = false;
        });

        // Done
        document.getElementById('action-done').addEventListener('click', () => {
          const output = document.getElementById('prompt-output');
          generatedPrompt = output.textContent;
          output.contentEditable = 'false';
          document.getElementById('action-done').hidden = true;
          document.getElementById('action-edit').hidden = false;
        });

        // Escape to cancel edit
        document.getElementById('prompt-output').addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            const output = document.getElementById('prompt-output');
            output.textContent = generatedPrompt;
            output.contentEditable = 'false';
            document.getElementById('action-done').hidden = true;
            document.getElementById('action-edit').hidden = false;
          }
        });

        // Regenerate
        document.getElementById('action-regenerate').addEventListener('click', async () => {
          setState('THINKING');
          const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
          if (!genResult.success) {
            setState('ERROR', { message: genResult.error });
            return;
          }
          generatedPrompt = genResult.prompt;
          setState('PROMPT_READY', { prompt: generatedPrompt });
        });

        // Boot gate — first-run setup or direct IDLE
        if (getFirstRunComplete()) {
          setState('IDLE');
        } else {
          initFirstRun();
        }
      });
    </script>
  </body>
</html>
