<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promptly</title>
    <style>
      :root {
        --color-action: #007AFF;
        --color-recording: #FF3B30;
        --color-success: #34C759;
        --bg-window: rgba(255, 255, 255, 0.85);
        --radius-window: 14px;
        --radius-inner: 8px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        background: var(--bg-window);
        border-radius: var(--radius-window);
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
      }

      #app {
        width: 480px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .state-panel {
        width: 100%;
        padding: 0 16px;
        display: flex;
        align-items: center;
      }

      /* IDLE */
      #state-idle {
        height: 44px;
        justify-content: center;
        gap: 8px;
        position: relative;
      }
      .mode-pill {
        font-size: 11px;
        font-weight: 600;
        color: var(--color-action);
        background: rgba(0, 122, 255, 0.08);
        padding: 2px 8px;
        border-radius: var(--radius-inner);
      }
      .shortcut-hint {
        font-size: 13px;
        color: rgba(0,0,0,0.4);
      }
      .conflict-notice {
        font-size: 11px;
        color: rgba(0,0,0,0.5);
        position: absolute;
        bottom: 4px;
        left: 0; right: 0;
        text-align: center;
      }

      /* RECORDING */
      #state-recording {
        height: 80px;
        flex-direction: column;
        padding: 8px 16px;
        gap: 6px;
      }
      .recording-row {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .recording-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-recording);
        flex-shrink: 0;
        animation: blink 1s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      .recording-transcript {
        flex: 1;
        font-size: 13px;
        color: rgba(0,0,0,0.75);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .stop-hint {
        font-size: 11px;
        color: rgba(0,0,0,0.35);
        flex-shrink: 0;
      }

      /* THINKING */
      #state-thinking {
        height: 44px;
        gap: 8px;
        justify-content: center;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(0,0,0,0.15);
        border-top-color: var(--color-action);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .thinking-text {
        font-size: 13px;
        color: rgba(0,0,0,0.5);
      }

      /* PROMPT_READY */
      #state-prompt-ready {
        height: 200px;
        flex-direction: column;
        padding: 12px 16px;
        gap: 10px;
        align-items: stretch;
        justify-content: flex-start;
      }
      .prompt-output {
        flex: 1;
        font-size: 13px;
        line-height: 1.5;
        color: rgba(0,0,0,0.85);
        overflow-y: auto;
        border-radius: var(--radius-inner);
        background: rgba(0,0,0,0.03);
        padding: 8px 10px;
        -webkit-user-select: text;
        user-select: text;
      }
      .prompt-output:focus {
        outline: 2px solid var(--color-action);
        outline-offset: -1px;
      }
      .action-row {
        display: flex;
        gap: 6px;
        justify-content: flex-start;
      }
      .btn-action {
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: var(--radius-inner);
        border: none;
        cursor: pointer;
        background: var(--color-action);
        color: #fff;
        transition: opacity 150ms ease;
      }
      .btn-action:hover { opacity: 0.85; }
      .btn-secondary {
        font-family: inherit;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: var(--radius-inner);
        border: none;
        cursor: pointer;
        background: rgba(0,0,0,0.06);
        color: rgba(0,0,0,0.6);
        transition: opacity 150ms ease;
        margin-left: auto;
      }
      .btn-secondary:hover { opacity: 0.75; }

      /* ERROR */
      #state-error {
        height: 44px;
        gap: 8px;
        cursor: pointer;
      }
      .error-icon {
        font-size: 14px;
        flex-shrink: 0;
      }
      .error-message {
        flex: 1;
        font-size: 12px;
        color: rgba(0,0,0,0.75);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .error-dismiss {
        font-size: 11px;
        color: rgba(0,0,0,0.35);
        flex-shrink: 0;
      }

      /* FIRST_RUN */
      #state-first-run {
        height: 120px;
        flex-direction: column;
        padding: 12px 16px;
        gap: 10px;
        align-items: stretch;
        justify-content: center;
      }
      .firstrun-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .firstrun-status {
        font-size: 14px;
        flex-shrink: 0;
      }
      .firstrun-label {
        flex: 1;
        font-size: 13px;
        color: rgba(0,0,0,0.75);
      }
      .status-ok    { color: var(--color-success); }
      .status-error { color: var(--color-recording); }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- FIRST_RUN -->
      <div id="state-first-run" class="state-panel" hidden>
        <div class="firstrun-row" id="firstrun-cli-row">
          <span id="firstrun-cli-status" class="firstrun-status">○</span>
          <span id="firstrun-cli-label" class="firstrun-label">Claude CLI installed</span>
        </div>
        <div class="firstrun-row" id="firstrun-mic-row">
          <span id="firstrun-mic-status" class="firstrun-status">○</span>
          <span id="firstrun-mic-label" class="firstrun-label">Microphone access granted</span>
          <button id="firstrun-mic-btn" class="btn-action">Grant Access</button>
        </div>
      </div>

      <!-- IDLE -->
      <div id="state-idle" class="state-panel" hidden>
        <span id="idle-mode-label" class="mode-pill">Balanced</span>
        <span id="idle-shortcut-hint" class="shortcut-hint">⌥Space</span>
        <span id="idle-conflict-notice" class="conflict-notice" hidden>Shortcut ⌥Space taken — using ⌃`</span>
      </div>

      <!-- RECORDING -->
      <div id="state-recording" class="state-panel" hidden>
        <div class="recording-row">
          <span id="recording-dot" class="recording-dot"></span>
          <span id="recording-transcript" class="recording-transcript">Listening…</span>
          <span id="recording-stop-hint" class="stop-hint">⌥Space to stop</span>
        </div>
      </div>

      <!-- THINKING -->
      <div id="state-thinking" class="state-panel" hidden>
        <div id="thinking-spinner" class="spinner"></div>
        <span id="thinking-text" class="thinking-text">Generating prompt…</span>
      </div>

      <!-- PROMPT_READY -->
      <div id="state-prompt-ready" class="state-panel" hidden>
        <div id="prompt-output" class="prompt-output"></div>
        <div class="action-row">
          <button id="action-copy" class="btn-action">Copy</button>
          <button id="action-edit" class="btn-action">Edit</button>
          <button id="action-done" class="btn-action btn-done" hidden>Done</button>
          <button id="action-regenerate" class="btn-secondary">Regenerate</button>
        </div>
      </div>

      <!-- ERROR -->
      <div id="state-error" class="state-panel" hidden>
        <span class="error-icon">⚠</span>
        <span id="error-message" class="error-message">An error occurred.</span>
        <span class="error-dismiss">Tap to dismiss</span>
      </div>
    </div>
    <script>
      let currentState = null;
      let transcript = '';
      let originalTranscript = '';
      let generatedPrompt = '';
      let cliOk = false;
      let micOk = false;

      const STATE_HEIGHTS = {
        FIRST_RUN: 120,
        IDLE: 44,
        RECORDING: 80,
        THINKING: 44,
        PROMPT_READY: 200,
        ERROR: 44,
      };

      function getMode() {
        try { return localStorage.getItem('mode') || 'balanced'; } catch { return 'balanced'; }
      }
      function setMode(value) {
        try { localStorage.setItem('mode', value); } catch { /* silent */ }
      }
      function getFirstRunComplete() {
        try { return localStorage.getItem('firstRunComplete') === 'true'; } catch { return false; }
      }
      function setFirstRunComplete(value) {
        try { localStorage.setItem('firstRunComplete', String(value)); } catch { /* silent */ }
      }

      function setState(newState, payload = {}) {
        if (STATE_HEIGHTS[newState] === undefined) {
          console.error('setState: unknown state', newState);
          return;
        }
        currentState = newState;

        // Hide all panels; show active
        const panels = ['FIRST_RUN', 'IDLE', 'RECORDING', 'THINKING', 'PROMPT_READY', 'ERROR'];
        panels.forEach(s => {
          const id = 'state-' + s.toLowerCase().replace('_', '-');
          document.getElementById(id).hidden = (s !== newState);
        });

        // Payload handling
        if (newState === 'ERROR' && payload.message) {
          document.getElementById('error-message').textContent = payload.message;
        }
        if (newState === 'PROMPT_READY' && payload.prompt) {
          document.getElementById('prompt-output').textContent = payload.prompt;
        }
        if (newState === 'IDLE') {
          document.getElementById('idle-conflict-notice').hidden = !payload.conflictNotice;
        }

        console.log('setState →', newState, payload);
        if (window.electronAPI && window.electronAPI.resizeWindow) {
          window.electronAPI.resizeWindow(STATE_HEIGHTS[newState]);
        }
      }

      async function initFirstRun() {
        setState('FIRST_RUN');

        // CLI check
        const cliStatus = document.getElementById('firstrun-cli-status');
        const cliLabel = document.getElementById('firstrun-cli-label');
        let cliResult;
        try {
          cliResult = await window.electronAPI.checkClaudePath();
        } catch {
          cliResult = { found: false, error: 'IPC unavailable' };
        }
        if (cliResult.found) {
          cliOk = true;
          cliStatus.textContent = '✓';
          cliStatus.className = 'firstrun-status status-ok';
        } else {
          cliStatus.textContent = '✗';
          cliStatus.className = 'firstrun-status status-error';
          cliLabel.textContent = 'Install: npm i -g @anthropic-ai/claude-code';
        }

        // Mic pre-check
        const micStatus = document.getElementById('firstrun-mic-status');
        const micLabel = document.getElementById('firstrun-mic-label');
        const micBtn = document.getElementById('firstrun-mic-btn');
        try {
          const permResult = await navigator.permissions.query({ name: 'microphone' });
          if (permResult.state === 'granted') {
            micOk = true;
            micStatus.textContent = '✓';
            micStatus.className = 'firstrun-status status-ok';
            micBtn.hidden = true;
          } else if (permResult.state === 'denied') {
            micStatus.textContent = '✗';
            micStatus.className = 'firstrun-status status-error';
            micLabel.textContent = 'Enable in System Settings → Privacy';
            micBtn.hidden = true;
          }
          // 'prompt' state: leave button visible, ○ stays
        } catch {
          // permissions API unsupported — leave button visible
        }

        checkFirstRunCompletion();
      }

      function checkFirstRunCompletion() {}

      document.addEventListener('DOMContentLoaded', () => {
        // Shortcut listener — stub cycle (F-SPEECH will replace this)
        window.electronAPI.onShortcutTriggered(() => {
          if (currentState === 'IDLE') {
            setState('RECORDING');
          } else if (currentState === 'RECORDING') {
            setState('THINKING');
            // F-SPEECH: replace stub
            setTimeout(() => setState('IDLE'), 2000);
          }
        });

        // Conflict notice — route through setState so re-entering IDLE resets visibility correctly
        window.electronAPI.onShortcutConflict(() => {
          setState('IDLE', { conflictNotice: true });
        });

        // Error dismiss on click
        document.getElementById('state-error').addEventListener('click', () => {
          setState('IDLE');
        });

        // Set mode label from localStorage
        const initialMode = getMode();
        document.getElementById('idle-mode-label').textContent =
          initialMode.charAt(0).toUpperCase() + initialMode.slice(1);

        // Boot gate — first-run setup or direct IDLE
        if (getFirstRunComplete()) {
          setState('IDLE');
        } else {
          initFirstRun();
        }
      });
    </script>
  </body>
</html>
