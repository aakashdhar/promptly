<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #007AFF;
      --red: #FF3B30;
      --green: #34C759;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    #bar {
      width: 480px;
      background: rgba(255,255,255,0.82);
      border-radius: 14px;
      overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.08);
    }

    #drag-region {
      height: 10px;
      -webkit-app-region: drag;
    }

    #content-row {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 16px 0 76px;
      -webkit-app-region: drag;
    }

    #waveform {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 32px;
      -webkit-app-region: no-drag;
      cursor: pointer;
    }

    .bar {
      width: 2px;
      border-radius: 2px;
      background: #d0d0d0;
      min-height: 3px;
      transition: height 80ms ease, background 200ms ease;
    }

    #right-side {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 12px;
      -webkit-app-region: no-drag;
      white-space: nowrap;
    }

    #right-side span {
      font-size: 10px;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.02em;
    }

    #transcript-section {
      display: none;
      padding: 0 16px 10px 76px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 13px;
      color: rgba(0,0,0,0.65);
      line-height: 1.5;
      max-height: 100px;
      overflow: hidden;
    }

    #prompt-section {
      display: none;
      padding: 0 16px 14px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    #you-said-label {
      font-size: 10px;
      letter-spacing: 0.07em;
      color: rgba(0,0,0,0.3);
      margin-bottom: 4px;
      margin-top: 10px;
    }

    #you-said-text {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 10px;
    }

    #prompt-output {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(0,0,0,0.85);
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    #prompt-output::-webkit-scrollbar { width: 3px; }
    #prompt-output::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    #button-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 0 0;
      margin-bottom: 8px;
    }

    #status-left {
      font-size: 13px;
      color: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #top-actions {
      display: flex;
      gap: 12px;
    }

    .text-btn {
      font-size: 12px;
      font-family: var(--font);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(0,0,0,0.3);
      padding: 0;
    }

    .text-btn:hover { color: var(--blue); }

    #btn-edit {
      height: 30px;
      padding: 0 14px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      background: transparent;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      color: rgba(0,0,0,0.7);
    }

    #btn-copy {
      flex: 1;
      height: 30px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: background 200ms ease;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes thinking { 0%,100%{transform:scale(0.6);opacity:0.4} 50%{transform:scale(1);opacity:1} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .rec-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1s ease-in-out infinite;
      display: inline-block;
    }

    .thinking-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--blue);
      display: inline-block;
      animation: thinking 1.2s ease infinite;
    }

    #mode-menu {
      position: fixed;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 140px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
      display: none;
    }

    .mode-menu-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      color: #1a1a1a;
      cursor: pointer;
      user-select: none;
    }

    .mode-menu-item:hover { background: rgba(0,122,255,0.08); }

    .mode-check {
      width: 12px;
      color: var(--blue);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div id="drag-region"></div>
    <div id="content-row">
      <div id="waveform"></div>
      <div id="right-side"></div>
    </div>
    <div id="transcript-section"></div>
    <div id="prompt-section">
      <div id="top-row">
        <div id="status-left"><span style="color:#34C759">✓</span> Prompt ready</div>
        <div id="top-actions">
          <button class="text-btn" id="btn-regenerate">Regenerate</button>
          <button class="text-btn" id="btn-reset">Reset</button>
        </div>
      </div>
      <p id="you-said-label">YOU SAID</p>
      <p id="you-said-text"></p>
      <div id="prompt-output"></div>
      <div id="button-row">
        <button id="btn-edit">Edit</button>
        <button id="btn-copy">Copy prompt</button>
      </div>
    </div>
  </div>
  <div id="mode-menu"></div>
  <script>
    const STATES = { IDLE:'IDLE', RECORDING:'RECORDING', THINKING:'THINKING', PROMPT_READY:'PROMPT_READY', ERROR:'ERROR' };
    const MODES = [
      { key: 'balanced', label: 'Balanced' },
      { key: 'detailed', label: 'Detailed' },
      { key: 'concise', label: 'Concise' },
      { key: 'chain', label: 'Chain' },
      { key: 'code', label: 'Code' },
    ];

    let state = STATES.IDLE;
    let originalTranscript = '';
    let generatedPrompt = '';
    let waveInterval = null;
    let t = 0;

    // Build 30 waveform bars on load
    const waveform = document.getElementById('waveform');
    for (let i = 0; i < 30; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = (Math.sin(i * 0.4) * 0.5 + 0.5) * 16 + 4 + 'px';
      waveform.appendChild(bar);
    }
    const bars = waveform.querySelectorAll('.bar');

    function setIdleWave() {
      bars.forEach((b, i) => {
        b.style.height = (Math.sin(i * 0.4) * 0.5 + 0.5) * 16 + 4 + 'px';
        b.style.background = '#d0d0d0';
      });
    }

    function startWaveAnim() {
      waveInterval = setInterval(() => {
        t++;
        bars.forEach((b, i) => {
          b.style.height = (Math.sin(i * 0.3 + t * 0.08) * 0.5 + 0.5) * 20 + 3 + 'px';
          b.style.background = '#FF3B30';
        });
      }, 60);
    }

    function stopWaveAnim() {
      clearInterval(waveInterval);
      waveInterval = null;
      setIdleWave();
    }

    function getMode() { return localStorage.getItem('mode') || 'balanced'; }
    function setMode(m) {
      localStorage.setItem('mode', m);
      if (state === STATES.IDLE) renderRightSide();
    }

    function getModeLabel() {
      return { balanced:'Balanced', detailed:'Detailed', concise:'Concise', chain:'Chain', code:'Code' }[getMode()];
    }

    function resize(h) { window.electronAPI.resizeWindow(h); }

    function setState(newState, payload = {}) {
      state = newState;
      const ts = document.getElementById('transcript-section');
      const ps = document.getElementById('prompt-section');
      ts.style.display = 'none';
      ps.style.display = 'none';

      if (newState === STATES.IDLE) {
        stopWaveAnim();
        setIdleWave();
        renderRightSide();
        resize(80);
      }

      if (newState === STATES.RECORDING) {
        startWaveAnim();
        renderRightSide();
        ts.style.display = 'block';
        ts.textContent = '';
        resize(80);
      }

      if (newState === STATES.THINKING) {
        stopWaveAnim();
        renderRightSide();
        ts.style.display = 'block';
        ts.textContent = originalTranscript;
      }

      if (newState === STATES.PROMPT_READY) {
        renderRightSide();
        ps.style.display = 'block';
        document.getElementById('you-said-text').textContent = originalTranscript;
        document.getElementById('prompt-output').textContent = generatedPrompt;
        resize(360);
      }

      if (newState === STATES.ERROR) {
        stopWaveAnim();
        renderRightSide(payload.message);
        resize(80);
      }
    }

    function renderRightSide(errorMsg) {
      const rs = document.getElementById('right-side');
      rs.innerHTML = '';

      if (state === STATES.IDLE) {
        rs.innerHTML = `<span>${getModeLabel()}</span><span>·</span><span>⌥ Space</span>`;
      }
      if (state === STATES.RECORDING) {
        rs.innerHTML = `<span class="rec-dot"></span><span style="color:#FF3B30;font-weight:500;font-size:10px;letter-spacing:.05em">REC</span><span>·</span><span>tap to stop</span>`;
      }
      if (state === STATES.THINKING) {
        rs.innerHTML = `<span class="thinking-dot" style="animation-delay:0s"></span><span class="thinking-dot" style="animation-delay:.2s"></span><span class="thinking-dot" style="animation-delay:.4s"></span><span style="font-size:12px;color:rgba(0,0,0,0.4);margin-left:8px">Building your prompt</span>`;
      }
      if (state === STATES.ERROR) {
        rs.innerHTML = `<span style="color:#FF3B30;font-size:12px">${errorMsg || 'Something went wrong'} — tap to retry</span>`;
      }
    }

    // Waveform click → toggle recording
    waveform.addEventListener('click', () => {
      if (state === STATES.IDLE) startRecording();
      else if (state === STATES.RECORDING) stopRecording();
    });

    document.getElementById('content-row').addEventListener('click', (e) => {
      if (e.target === document.getElementById('content-row')) {
        if (state === STATES.IDLE) startRecording();
      }
    });

    // Error bar click → retry (back to IDLE)
    document.getElementById('right-side').addEventListener('click', () => {
      if (state === STATES.ERROR) setState(STATES.IDLE);
    });

    // Global shortcut signal from main process
    window.electronAPI.onShortcutTriggered(() => {
      if (state === STATES.IDLE) startRecording();
      else if (state === STATES.RECORDING) stopRecording();
    });

    // Recording
    let mediaRecorder = null;
    let audioChunks = [];

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        setState(STATES.RECORDING);
      } catch(e) {
        setState(STATES.ERROR, { message: 'Microphone access denied' });
      }
    }

    async function stopRecording() {
      if (!mediaRecorder) return;
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const arrayBuffer = await blob.arrayBuffer();
        setState(STATES.THINKING);
        const transcribeResult = await window.electronAPI.transcribeAudio(arrayBuffer);
        if (!transcribeResult.success) {
          setState(STATES.ERROR, { message: transcribeResult.error });
          return;
        }
        originalTranscript = transcribeResult.transcript.trim();
        if (!originalTranscript) {
          setState(STATES.IDLE);
          return;
        }
        const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
        if (!genResult.success) {
          setState(STATES.ERROR, { message: genResult.error?.slice(0, 60) || 'Claude error' });
          return;
        }
        generatedPrompt = genResult.prompt;
        setState(STATES.PROMPT_READY);
      };
    }

    // Copy
    document.getElementById('btn-copy').addEventListener('click', () => {
      window.electronAPI.copyToClipboard(generatedPrompt);
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied ✓';
      btn.style.background = '#34C759';
      setTimeout(() => { btn.textContent = 'Copy prompt'; btn.style.background = '#007AFF'; }, 1800);
    });

    // Edit / Done toggle
    document.getElementById('btn-edit').addEventListener('click', () => {
      const out = document.getElementById('prompt-output');
      const btn = document.getElementById('btn-edit');
      if (btn.textContent === 'Edit') {
        out.contentEditable = 'true';
        out.style.outline = '1.5px solid #007AFF';
        out.style.outlineOffset = '4px';
        out.focus();
        btn.textContent = 'Done';
      } else {
        generatedPrompt = out.textContent;
        out.contentEditable = 'false';
        out.style.outline = 'none';
        btn.textContent = 'Edit';
      }
    });

    // Escape: cancel edit or stop recording
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const out = document.getElementById('prompt-output');
        if (out.contentEditable === 'true') {
          out.textContent = generatedPrompt;
          out.contentEditable = 'false';
          out.style.outline = 'none';
          document.getElementById('btn-edit').textContent = 'Edit';
        } else if (state === STATES.RECORDING) {
          stopRecording();
        }
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'c' && state === STATES.PROMPT_READY) {
        const out = document.getElementById('prompt-output');
        if (out.contentEditable !== 'true') {
          window.electronAPI.copyToClipboard(generatedPrompt);
        }
      }
    });

    // Regenerate
    document.getElementById('btn-regenerate').addEventListener('click', async () => {
      setState(STATES.THINKING);
      const genResult = await window.electronAPI.generatePrompt(originalTranscript, getMode());
      if (!genResult.success) {
        setState(STATES.ERROR, { message: 'Claude error' });
        return;
      }
      generatedPrompt = genResult.prompt;
      setState(STATES.PROMPT_READY);
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => setState(STATES.IDLE));

    // Mode context menu
    const modeMenu = document.getElementById('mode-menu');
    MODES.forEach(({ key, label }) => {
      const item = document.createElement('div');
      item.className = 'mode-menu-item';
      item.dataset.mode = key;
      const check = document.createElement('span');
      check.className = 'mode-check';
      check.textContent = getMode() === key ? '✓' : '';
      const txt = document.createElement('span');
      txt.textContent = label;
      item.appendChild(check);
      item.appendChild(txt);
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        setMode(key);
        document.querySelectorAll('.mode-check').forEach((el) => {
          el.textContent = el.closest('.mode-menu-item').dataset.mode === key ? '✓' : '';
        });
        modeMenu.style.display = 'none';
      });
      modeMenu.appendChild(item);
    });

    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (state !== STATES.IDLE) return;
      modeMenu.style.display = 'block';
      const x = Math.min(e.clientX, window.innerWidth - 160);
      const y = Math.max(0, e.clientY - modeMenu.offsetHeight - 4);
      modeMenu.style.left = x + 'px';
      modeMenu.style.top = y + 'px';
    });

    window.addEventListener('click', () => { modeMenu.style.display = 'none'; });

    // Init
    setState(STATES.IDLE);
  </script>
</body>
</html>
